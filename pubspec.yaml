name: anonpro
description: Anonymous social media platform with professional features
publish_to: "none"
version: 1.0.1+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.0.0

  # State Management & Navigation
  provider: ^6.1.1

  # UI Components
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0

  # Image Handling
  image_picker: ^1.0.5
  image_cropper: ^11.0.0
  extended_image: ^8.2.1

  # Time & Date
  timeago: ^3.6.0
  intl: ^0.18.1

  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  flutter_svg: ^2.0.9
  uuid: ^4.2.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  path: ^1.9.0

  # Firebase (updated versions)
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

  # Icons
  cupertino_icons: ^1.0.6
  screenshot: ^3.0.0
  image: ^4.8.0
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  connectivity_plus: ^7.0.0
  home_widget: ^0.7.0
  google_generative_ai: ^0.4.7
  lottie: ^3.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/anon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/anon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/knowledge.json
    - assets/knowledge/

  # Add custom fonts if needed
  # fonts:
  #   - family: SF Pro Display
  #     fonts:
  #       - asset: assets/fonts/SF-Pro-Display-Regular.otf
  #       - asset: assets/fonts/SF-Pro-Display-Bold.otf
  #         weight: 700
